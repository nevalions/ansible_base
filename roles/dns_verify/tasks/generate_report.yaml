---
- name: Calculate overall health status
  ansible.builtin.set_fact:
    dns_health_status: "{{ 'CRITICAL' if dns_verify_failed | int > 0 else 'DEGRADED' if dns_verify_warnings | int > 0 else 'HEALTHY' }}"

- name: Determine host type
  ansible.builtin.set_fact:
    host_type: "{{ 'DNS Server' if inventory_hostname in groups.get('dns_servers', []) else 'DNS Client' if inventory_hostname in groups.get('dns_clients', []) else 'Unknown' }}"

- name: Display host verification summary
  ansible.builtin.debug:
    msg:
      - "=== Host Verification Summary: {{ inventory_hostname | sanitize_security }} ==="
      - "Host Type: {{ host_type }}"
      - "WireGuard: {{ 'UP' if wg_interface_status.rc == 0 else 'DOWN' if wg_interface_status is defined else 'N/A' }}"
      - "VPN IP: {{ host_vpn_ip | default('N/A') | sanitize_security }}"
      - "--- Internal DNS ---"
      - "  Resolution: {{ dns_internal_passed | default(0) }}/{{ dns_internal_test_count | default(0) }} passed"
      - "--- External DNS ---"
      - "  Primary: {{ dns_external_primary_passed | default(0) }}/{{ dns_external_primary_count | default(0) }} passed"
      - "  Secondary: {{ dns_external_secondary_passed | default(0) }}/{{ dns_external_secondary_count | default(0) }} passed"
      - "--- External Connectivity ---"
      - "  DNS Resolution: {{ ext_dns_passed | default(0) }}/{{ ext_dns_total | default(0) }} endpoints resolved"
      - "  TCP Reachability: {{ ext_tcp_passed | default(0) }}/{{ ext_tcp_total | default(0) }} endpoints reachable"
      - "--- Totals ---"
      - "  Tests Total: {{ dns_verify_tests_total }}"
      - "  Tests Passed: {{ dns_verify_passed }}"
      - "  Tests Failed: {{ dns_verify_failed }}"
      - "  Warnings: {{ dns_verify_warnings }}"
      - "  Health Status: {{ dns_health_status }}"
      - "============================================="

- name: Display failed endpoints for this host
  ansible.builtin.debug:
    msg:
      - "  !! Failed DNS endpoints: {{ ext_failed_dns_list }}"
      - "  !! Failed TCP endpoints: {{ ext_failed_tcp_list }}"
  when: (ext_conn_tests_failed | default(0) | int) > 0

# ── Cluster-wide aggregated report ───────────────────────────────
# With serial: 1, each host runs in its own batch. run_once fires
# every batch but only sees the current host. We must aggregate
# across all hosts via hostvars using ansible_play_hosts_all.

- name: Aggregate cluster totals across all hosts
  ansible.builtin.set_fact:
    cluster_tests_total: >-
      {{ ansible_play_hosts_all
         | map('extract', hostvars, 'dns_verify_tests_total')
         | map('default', 0) | map('int') | sum }}
    cluster_tests_passed: >-
      {{ ansible_play_hosts_all
         | map('extract', hostvars, 'dns_verify_passed')
         | map('default', 0) | map('int') | sum }}
    cluster_tests_failed: >-
      {{ ansible_play_hosts_all
         | map('extract', hostvars, 'dns_verify_failed')
         | map('default', 0) | map('int') | sum }}
    cluster_tests_warnings: >-
      {{ ansible_play_hosts_all
         | map('extract', hostvars, 'dns_verify_warnings')
         | map('default', 0) | map('int') | sum }}
    cluster_ext_conn_failed: >-
      {{ ansible_play_hosts_all
         | map('extract', hostvars, 'ext_conn_tests_failed')
         | map('default', 0) | map('int') | sum }}

- name: Determine cluster health status
  ansible.builtin.set_fact:
    cluster_health: >-
      {{ 'CRITICAL' if cluster_tests_failed | int > 0
         else 'DEGRADED' if cluster_tests_warnings | int > 0
         else 'HEALTHY' }}

- name: Build per-host status lines
  ansible.builtin.set_fact:
    cluster_host_lines: >-
      {%- set ns = namespace(lines=[]) -%}
      {%- for h in ansible_play_hosts_all -%}
        {%- set hv = hostvars[h] -%}
        {%- set status = 'CRITICAL' if (hv.dns_verify_failed | default(0) | int) > 0
            else 'DEGRADED' if (hv.dns_verify_warnings | default(0) | int) > 0
            else 'HEALTHY' -%}
        {%- set _ = ns.lines.append(
            (h | sanitize_security) ~ ': ' ~ status
            ~ ' (tests: ' ~ (hv.dns_verify_passed | default(0)) ~ '/' ~ (hv.dns_verify_tests_total | default(0))
            ~ ', failed: ' ~ (hv.dns_verify_failed | default(0))
            ~ ', warnings: ' ~ (hv.dns_verify_warnings | default(0)) ~ ')'
        ) -%}
      {%- endfor -%}
      {{ ns.lines }}

- name: Build list of hosts with failed external endpoints
  ansible.builtin.set_fact:
    cluster_ext_failures: >-
      {%- set ns = namespace(lines=[]) -%}
      {%- for h in ansible_play_hosts_all -%}
        {%- set hv = hostvars[h] -%}
        {%- if (hv.ext_conn_tests_failed | default(0) | int) > 0 -%}
          {%- set _ = ns.lines.append(
              (h | sanitize_security)
              ~ ' - DNS: ' ~ (hv.ext_failed_dns_list | default('none'))
              ~ ' | TCP: ' ~ (hv.ext_failed_tcp_list | default('none'))
          ) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns.lines }}

# Only show the final cluster report on the very last host in the play
- name: Generate cluster verification report
  ansible.builtin.debug:
    msg:
      - "========================================================"
      - "=== DNS Infrastructure Verification Report ==="
      - "========================================================"
      - "Run Date: {{ ansible_facts['date_time']['date'] }} {{ ansible_facts['date_time']['time'] }}"
      - "Total Hosts Checked: {{ ansible_play_hosts_all | length }}"
      - ""
      - "--- Per-Host Status ---"
      - "{{ cluster_host_lines | join('\n') }}"
      - ""
      - "--- Cluster Totals ---"
      - "Tests Total: {{ cluster_tests_total }}"
      - "Tests Passed: {{ cluster_tests_passed }}"
      - "Tests Failed: {{ cluster_tests_failed }}"
      - "Warnings: {{ cluster_tests_warnings }}"
      - ""
      - "--- External Connectivity ---"
      - "Endpoints Unreachable (cluster-wide): {{ cluster_ext_conn_failed }}"
      - "{{ 'Affected Hosts:' if (cluster_ext_failures | length > 0) else 'All hosts reached all endpoints' }}"
      - "{{ cluster_ext_failures | join('\n') if (cluster_ext_failures | length > 0) else '' }}"
      - ""
      - "--- Overall Cluster Health ---"
      - "WireGuard Cluster: {{ 'UP' if wg_interface_status.rc == 0 else 'DOWN' }}"
      - "DNS Servers: {{ 'All healthy' if cluster_tests_failed | int == 0 else 'Issues detected' }}"
      - "DNS Clients: {{ 'All connected' if cluster_tests_failed | int == 0 else 'Issues detected' }}"
      - "DNS Resolution: {{ 'Working' if cluster_tests_failed | int == 0 else 'Failed' }}"
      - "External Connectivity: {{ 'All reachable' if (cluster_ext_conn_failed | int == 0) else (cluster_ext_conn_failed | string ~ ' endpoint(s) unreachable') }}"
      - ""
      - "Overall Status: {{ '✅ HEALTHY' if cluster_health | trim == 'HEALTHY' else '⚠️ DEGRADED' if cluster_health | trim == 'DEGRADED' else '❌ CRITICAL' }}"
      - "========================================================"
  when: inventory_hostname == ansible_play_hosts_all[-1]

- name: Fail playbook if critical issues detected
  ansible.builtin.fail:
    msg: "DNS Infrastructure Verification FAILED - {{ cluster_tests_failed }} critical issue(s) detected across cluster"
  when:
    - verify_fail_immediately
    - cluster_tests_failed | int > 0
    - inventory_hostname == ansible_play_hosts_all[-1]
