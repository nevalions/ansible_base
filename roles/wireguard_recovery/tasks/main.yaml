---
# Deploy WireGuard automatic peer recovery
# Uses a systemd timer that periodically checks tunnel health and
# restarts the WireGuard interface if peers are unreachable.

- name: Deploy WireGuard recovery script
  ansible.builtin.template:
    src: wg-recovery-check.sh.j2
    dest: "{{ wg_recovery_script_path }}"
    owner: root
    group: root
    mode: "0755"
  notify: Restart wg-recovery-check timer

- name: Deploy systemd service unit
  ansible.builtin.template:
    src: wg-recovery-check.service.j2
    dest: /etc/systemd/system/wg-recovery-check.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart wg-recovery-check timer

- name: Deploy systemd timer unit
  ansible.builtin.template:
    src: wg-recovery-check.timer.j2
    dest: /etc/systemd/system/wg-recovery-check.timer
    owner: root
    group: root
    mode: "0644"
  notify: Restart wg-recovery-check timer

- name: Ensure log file exists with correct permissions
  ansible.builtin.file:
    path: "{{ wg_recovery_log_file }}"
    state: touch
    owner: root
    group: root
    mode: "0644"
    modification_time: preserve
    access_time: preserve

- name: Enable and start wg-recovery-check timer
  ansible.builtin.systemd_service:
    name: wg-recovery-check.timer
    state: started
    enabled: true
    daemon_reload: true

- name: Verify timer is active
  ansible.builtin.command: systemctl is-active wg-recovery-check.timer
  register: wg_recovery_timer_status
  changed_when: false
  ignore_errors: true

- name: Display recovery timer status
  ansible.builtin.debug:
    msg: "WireGuard recovery timer: {{ wg_recovery_timer_status.stdout | default('unknown') }}"
