---
- name: Ensure unbound configuration directory exists
  ansible.builtin.file:
    path: /etc/unbound/unbound.conf.d
    state: directory
    mode: '0755'

- name: Stop and disable systemd-resolved
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: stopped
    enabled: false
  when: dns_operation == "install"

- name: Remove systemd-resolved stub resolv.conf
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent
  when:
    - dns_operation == "install"
    - ansible_facts['os_family'] == 'Debian'

- name: Create basic resolv.conf
  ansible.builtin.copy:
    content: |
      nameserver 127.0.0.1
      nameserver 8.8.8.8
    dest: /etc/resolv.conf
    mode: '0644'
  when:
    - dns_operation == "install"
    - ansible_facts['os_family'] == 'Debian'

- name: Deploy Unbound main configuration
  ansible.builtin.template:
    src: unbound.conf.j2
    dest: /etc/unbound/unbound.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: Restart unbound

- name: Setup unbound-control keys (required for remote-control)
  ansible.builtin.command: unbound-control-setup
  args:
    creates: /etc/unbound/unbound_server.key
  when: dns_operation == "install"

- name: Deploy DNS zone configuration
  ansible.builtin.template:
    src: zone.conf.j2
    dest: /etc/unbound/unbound.conf.d/zone.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: Reload unbound

# ── Unbound watchdog timer ──────────────────────────────────────────────────
# Tests external resolution every {{ dns_watchdog_interval }}.
# On failure: flush cache → retry → restart (escalating recovery).

- name: Deploy watchdog script
  ansible.builtin.template:
    src: unbound-watchdog.sh.j2
    dest: /usr/local/bin/unbound-watchdog.sh
    owner: root
    group: root
    mode: '0755'
  when:
    - dns_operation == "install"
    - dns_watchdog_enabled | bool

- name: Deploy watchdog systemd service
  ansible.builtin.template:
    src: unbound-watchdog.service.j2
    dest: /etc/systemd/system/unbound-watchdog.service
    owner: root
    group: root
    mode: '0644'
  when:
    - dns_operation == "install"
    - dns_watchdog_enabled | bool

- name: Deploy watchdog systemd timer
  ansible.builtin.template:
    src: unbound-watchdog.timer.j2
    dest: /etc/systemd/system/unbound-watchdog.timer
    owner: root
    group: root
    mode: '0644'
  when:
    - dns_operation == "install"
    - dns_watchdog_enabled | bool

- name: Enable and start watchdog timer
  ansible.builtin.systemd_service:
    name: unbound-watchdog.timer
    enabled: true
    state: started
    daemon_reload: true
  when:
    - dns_operation == "install"
    - dns_watchdog_enabled | bool
    - not ansible_check_mode

# ── DNSSEC root key refresh timer ───────────────────────────────────────────
# Daily refresh of the root trust anchor via unbound-anchor.
# Prevents stale root.key between Ansible deploys.

- name: Deploy anchor refresh systemd service
  ansible.builtin.template:
    src: unbound-anchor-refresh.service.j2
    dest: /etc/systemd/system/unbound-anchor-refresh.service
    owner: root
    group: root
    mode: '0644'
  when:
    - dns_operation == "install"
    - dns_anchor_refresh_enabled | bool

- name: Deploy anchor refresh systemd timer
  ansible.builtin.template:
    src: unbound-anchor-refresh.timer.j2
    dest: /etc/systemd/system/unbound-anchor-refresh.timer
    owner: root
    group: root
    mode: '0644'
  when:
    - dns_operation == "install"
    - dns_anchor_refresh_enabled | bool

- name: Enable and start anchor refresh timer
  ansible.builtin.systemd_service:
    name: unbound-anchor-refresh.timer
    enabled: true
    state: started
    daemon_reload: true
  when:
    - dns_operation == "install"
    - dns_anchor_refresh_enabled | bool
    - not ansible_check_mode
