---
skip_folder_check: true

dns_listen_interface: "0.0.0.0"
dns_operation: "install"
dns_upstream_dns: >-
  {{
    (vault_dns_upstream_dns_by_host | default({})).get(
      inventory_hostname,
      vault_dns_upstream_dns | default(['77.88.8.8', '1.1.1.1', '9.9.9.9'])
    )
  }}
dns_cache_size: 256
dns_do_ipv6: false

# ── Forwarding hardening ──────────────────────────────────────────────────────
# Disable SO_REUSEPORT to prevent orphaned unbound processes from binding to
# port 53 and silently stealing queries with stale cache/config.
dns_so_reuseport: false

# Disable qname-minimisation in forwarding mode. It triggers partial iterative
# lookups that cache broken NS referrals for TLDs (.io, .com) when IPv6-only
# nameservers are unreachable (do-ip6: no). This was the root cause of
# intermittent ANSWER:0 responses for ghcr.io/docker.io/google.com.
dns_qname_minimisation: false

# Serve expired cache entries while fetching fresh data from upstream.
# WARNING: In forwarding mode, serve-expired amplifies transient failures by
# preserving stale NS referral cache entries (with ~86400s TTL) that were cached
# during momentary upstream timeouts. These poisoned entries are then served
# indefinitely instead of forwarding fresh queries. Disabled by default — the
# stable haproxy_spb DNS server runs without serve-expired and never has this
# problem, while bay_bgp with serve-expired: yes saw 16+ cache poisoning events
# per day. Only enable if you have a specific need and understand the risk.
dns_serve_expired: false
dns_serve_expired_ttl: 86400

# Prefetch popular entries before they expire, keeping cache warm.
# In forwarding mode, prefetch queries can race with normal queries and
# occasionally cache NS referral responses during transient upstream issues.
# Disabled by default to match the stable haproxy_spb configuration.
dns_prefetch: false

# Disable local DNSSEC validation for forwarding-only resolvers.
# Upstream resolvers (77.88.8.8, 1.1.1.1, 9.9.9.9) already validate DNSSEC.
# Local validation causes the validator module to do iterative lookups for
# DS/DNSKEY chain verification, populating the cache with TLD NS referrals
# (e.g. com. NS, io. NS) that get served as ANSWER:0 responses when
# forwarding queries time out — the root cause of intermittent DNS failures.
dns_dnssec_validation: false

# ── Watchdog timer ────────────────────────────────────────────────────────────
# Periodically tests whether Unbound can resolve external domains.
# On failure: flush cache → retry → restart service (escalating recovery).
# After a restart, a cooldown period prevents re-checking until the cache warms.
dns_watchdog_enabled: true
dns_watchdog_interval: "60s"
dns_watchdog_test_domains:
  - "google.com"
  - "ghcr.io"
dns_watchdog_timeout: 5
dns_watchdog_tries: 2
dns_watchdog_cooldown_seconds: 120

# ── DNSSEC root key refresh ──────────────────────────────────────────────────
# Daily systemd timer that runs unbound-anchor to refresh the DNSSEC root
# trust anchor. Prevents stale root.key after long periods between deploys.
dns_anchor_refresh_enabled: true
