---
- name: Test dns_server role variables and structure
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ansible_become_pass: "test"
    dns_listen_interface: "0.0.0.0"
    dns_operation: "install"
    dns_upstream_dns:
      - "[dns-server]"
      - "8.8.4.4"
    dns_cache_size: 256
    dns_do_ipv6: false
    dns_watchdog_enabled: true
    dns_watchdog_interval: "60s"
    dns_watchdog_test_domains:
      - "google.com"
      - "ghcr.io"
    dns_watchdog_timeout: 5
    dns_watchdog_tries: 2
    dns_watchdog_cooldown_seconds: 120
    dns_anchor_refresh_enabled: true
    dns_so_reuseport: false
    dns_qname_minimisation: false
    dns_serve_expired: true
    dns_serve_expired_ttl: 86400
    dns_prefetch: true
    dns_dnssec_validation: false
    test_dns_records:
      - type: "A"
        name: "test-host"
        ip: "[internal-ip]"
      - type: "A"
        name: "test-service"
        ip: "[internal-ip]"
    test_dns_servers:
      - "[internal-ip]"
      - "[internal-ip]"
  tasks:
    - name: Verify default variables exist
      ansible.builtin.assert:
        that:
          - dns_listen_interface is defined
          - dns_operation is defined
          - dns_upstream_dns is defined
          - dns_cache_size is defined
          - dns_do_ipv6 is defined
          - dns_watchdog_enabled is defined
          - dns_watchdog_interval is defined
          - dns_watchdog_test_domains is defined
          - dns_watchdog_timeout is defined
          - dns_watchdog_tries is defined
          - dns_watchdog_cooldown_seconds is defined
          - dns_anchor_refresh_enabled is defined
          - dns_so_reuseport is defined
          - dns_qname_minimisation is defined
          - dns_serve_expired is defined
          - dns_serve_expired_ttl is defined
          - dns_prefetch is defined
          - dns_dnssec_validation is defined
        success_msg: "Default variables defined correctly"
        fail_msg: "Default variables are missing"

    - name: Verify default variable types
      ansible.builtin.assert:
        that:
          - dns_listen_interface is string
          - dns_operation is string
          - dns_upstream_dns is iterable
          - dns_upstream_dns | length > 0
          - dns_cache_size is number
          - dns_do_ipv6 is boolean
          - dns_watchdog_enabled is boolean
          - dns_watchdog_interval is string
          - dns_watchdog_test_domains is iterable
          - dns_watchdog_test_domains | length > 0
          - dns_watchdog_timeout is number
          - dns_watchdog_tries is number
          - dns_watchdog_cooldown_seconds is number
          - dns_anchor_refresh_enabled is boolean
          - dns_so_reuseport is boolean
          - dns_qname_minimisation is boolean
          - dns_serve_expired is boolean
          - dns_serve_expired_ttl is number
          - dns_prefetch is boolean
          - dns_dnssec_validation is boolean
        success_msg: "Default variables have correct types"
        fail_msg: "Default variables have incorrect types"

    - name: Verify watchdog test domains are non-empty strings
      ansible.builtin.assert:
        that:
          - item | length > 0
          - item is string
        success_msg: "Watchdog domain '{{ item }}' is valid"
        fail_msg: "Watchdog domain '{{ item }}' is invalid"
      loop: "{{ dns_watchdog_test_domains }}"

    - name: Verify DNS records structure
      ansible.builtin.assert:
        that:
          - test_dns_records is defined
          - test_dns_records | length == 2
          - test_dns_records[0].type == "A"
          - test_dns_records[0].name == "test-host"
          - test_dns_records[0].ip == "[internal-ip]"
        success_msg: "DNS records structure is correct"
        fail_msg: "DNS records structure is invalid"

    - name: Test DNS servers list structure
      ansible.builtin.assert:
        that:
          - test_dns_servers is defined
          - test_dns_servers | length == 2
          - "'[internal-ip]' in test_dns_servers"
          - "'[internal-ip]' in test_dns_servers"
        success_msg: "DNS servers list structure is correct"
        fail_msg: "DNS servers list structure is invalid"

    - name: Test lowercase variable naming
      ansible.builtin.set_fact:
        test_var_lowercase: "lowercase_variable_name"

    - name: Verify lowercase naming convention
      ansible.builtin.assert:
        that:
          - test_var_lowercase is match("^[a-z][a-z0-9_]*$")
        success_msg: "Variable naming follows lowercase convention"
        fail_msg: "Variable naming does not follow lowercase convention"
